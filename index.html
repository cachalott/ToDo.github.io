<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои Задачи</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .task { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ccc; }
        .completed span { text-decoration: line-through; color: gray; }
        input[type="text"] { width: 70%; padding: 8px; }
        button { padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Управление задачами</h2>
    <div>
        <input type="text" id="taskInput" placeholder="Новая задача...">
        <button onclick="addTask()">Добавить</button>
    </div>

    <div id="taskList" style="margin-top: 20px;"></div>

    <script>
        function loadTasks() {
            const data = localStorage.getItem('tasks');
            return data ? JSON.parse(data) : [];
        }

        function saveTasks(tasks) {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const title = input.value.trim();
            if (!title) return;

            const tasks = loadTasks();
            const newTask = {
                id: Date.now(), 
                title: title,
                completed: false
            };
            tasks.push(newTask);
            saveTasks(tasks);

            input.value = '';
            renderTasks();
        }

        function toggleTask(id) {
            const tasks = loadTasks();
            const task = tasks.find(t => t.id === id);
            if (task) task.completed = !task.completed;
            saveTasks(tasks);
            renderTasks();
        }

        function deleteTask(id) {
            const tasks = loadTasks().filter(t => t.id !== id);
            saveTasks(tasks);
            renderTasks();
        }

        function renderTasks() {
            const tasks = loadTasks();
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            if (tasks.length === 0) {
                list.innerHTML = '<p style="color: gray;">Список задач пуст.</p>';
                return;
            }

            tasks.forEach(task => {
                list.innerHTML += `
                    <div class="task ${task.completed ? 'completed' : ''}">
                        <span onclick="toggleTask(${task.id})" style="cursor:pointer;">
                            ${task.completed ? '✅' : '⬜'} ${task.title}
                        </span>
                        <button onclick="deleteTask(${task.id})">Удалить</button>
                    </div>
                `;
            });
        }

        document.getElementById('taskInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addTask();
        });

        renderTasks();
    </script>
</body>
</html>
